name: Voicebox backend

on:
  push:
    paths:
      - "voicebox-backend/**"
      - "scripts/test-voicebox-contract.ps1"
      - ".github/workflows/voicebox-backend.yml"
  pull_request:
    paths:
      - "voicebox-backend/**"
      - "scripts/test-voicebox-contract.ps1"

jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compileall backend
        run: python -m compileall voicebox-backend/backend -q

  rust-voicebox-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Stub voicebox-server sidecar for Tauri build
        run: |
          mkdir -p src-tauri/binaries
          stub="src-tauri/binaries/voicebox-server-x86_64-unknown-linux-gnu"
          printf '#!/bin/sh\nexit 0\n' > "$stub"
          chmod +x "$stub"
      - name: cargo test voicebox_server
        working-directory: src-tauri
        run: cargo test voicebox_server -- --nocapture
